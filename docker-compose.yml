services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: restaurant_db
    environment:
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_password
      POSTGRES_DB: restaurant_os
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurant_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: restaurant_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://restaurant_user:restaurant_password@postgres:5432/restaurant_os
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-with-a-strong-secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-with-a-strong-jwt-secret}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - restaurant_network

  # Frontend apps are not present in this workspace.
  # Remove or add those services when frontend project folders are available.

networks:
  restaurant_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

